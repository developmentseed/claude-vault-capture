version: 2
updates:
  # Python dependencies (pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait a week before proposing a new release, so a freshly-published
    # (potentially compromised) version isn't pulled on day zero. Security
    # updates ignore the cooldown.
    cooldown:
      default-days: 7
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps"

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"

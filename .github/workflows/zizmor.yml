name: zizmor

# Static-analysis security audit of the GitHub Actions workflows themselves
# (https://github.com/zizmorcore/zizmor). Catches over-broad permissions,
# credential persistence, unpinned actions, injection sinks, etc.

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: zizmor-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Audit workflows
        env:
          # Lets zizmor run its online audits (impostor-commit, ref-confusion).
          GH_TOKEN: ${{ github.token }}
        # Scan all of .github/ (workflows + dependabot.yml), matching the
        # zizmor pre-commit hook so local and CI findings stay in sync.
        run: uvx zizmor .github/

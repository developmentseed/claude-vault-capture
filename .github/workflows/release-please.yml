name: release-please

# On every push to main, maintain a release PR that accrues the CHANGELOG and
# bumps the version from Conventional Commits. Merging that PR tags vX.Y.Z and
# cuts a GitHub Release. See release-please-config.json.

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create release commits, tags, and GitHub Releases
      pull-requests: write # open/update the release PR
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
